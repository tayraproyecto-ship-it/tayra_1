<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierbas Medicinales</title>

    <link rel="stylesheet" href="hierbas.css">
</head>

<body>

    <div class="contenedor">

        <h1 id="saludo"></h1>

        <h2>🌿 Enciclopedia de Hierbas Medicinales</h2>

        <div class="cards">

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/766/766212.png">
                <h3>Muña</h3>
                <p>
                    Ayuda contra el dolor de estómago y el soroche.
                </p>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/415/415733.png">
                <h3>Eucalipto</h3>
                <p>
                    Bueno para la gripe y problemas respiratorios.
                </p>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/2909/2909763.png">
                <h3>Manzanilla</h3>
                <p>
                    Relaja el cuerpo y mejora la digestión.
                </p>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/628/628324.png">
                <h3>Romero</h3>
                <p>
                    Ayuda a la memoria y circulación.
                </p>
            </div>

        </div>

    </div>

    <script src="hierbas.js"></script>

</body>
</html>
